<svg width="100%" viewBox="0 0 680 260" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Animated security shield scan banner</title>
  <desc>A shield icon with a moving scan line and a threat status readout</desc>
  <defs>
    <clipPath id="shieldClip">
      <path d="M340 40 L420 70 V150 C420 190 385 215 340 230 C295 215 260 190 260 150 V70 Z"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="680" height="260" fill="#0d1117"/>

  <path d="M340 40 L420 70 V150 C420 190 385 215 340 230 C295 215 260 190 260 150 V70 Z"
    fill="none" stroke="#00e5ff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </path>

  <path d="M310 135 L330 155 L372 105" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <g clip-path="url(#shieldClip)">
    <rect x="260" y="40" width="160" height="6" fill="#00e5ff" opacity="0.6">
      <animate attributeName="y" values="40;224;40" dur="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <circle cx="150" cy="130" r="4" fill="#00e5ff">
    <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="135" fill="#00e5ff" font-family="monospace" font-size="16">SCANNING CONTAINER</text>

  <text x="170" y="165" fill="#5dcaa5" font-family="monospace" font-size="18" font-weight="bold">
    THREAT: 0 DETECTED
    <animate attributeName="opacity" values="1;1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="150" y="100" fill="#8b949e" font-family="monospace" font-size="13">trivy image scan --severity CRITICAL,HIGH</text>

  <rect x="480" y="118" width="130" height="26" rx="4" fill="none" stroke="#5dcaa5" stroke-width="1"/>
  <circle cx="497" cy="131" r="5" fill="#5dcaa5">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="512" y="136" fill="#5dcaa5" font-family="monospace" font-size="13">SECURE</text>
</svg>
